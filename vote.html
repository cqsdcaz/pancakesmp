<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote | PanCake SMP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #080808;
            --card-gray: rgba(22, 22, 22, 0.8);
            --accent-orange: #ff9901;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        /* Fixed Gaming Crosshair Cursor */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            cursor: crosshair !important; 
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animated Particle Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .header { text-align: center; margin-bottom: 40px; z-index: 1; }
        .header h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .header p { color: var(--text-gray); }

        .reward-alert {
            background: rgba(255, 153, 1, 0.1);
            border-left: 4px solid var(--accent-orange);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            max-width: 800px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .vote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
            z-index: 1;
        }

        .vote-link {
            background: var(--card-gray);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px 20px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(12px);
            transform-style: preserve-3d;
            transform: perspective(1000px);
        }

        /* High Contrast Mode Class */
        body.high-contrast .vote-link {
            background: #000;
            border: 2px solid #fff;
            backdrop-filter: none;
            opacity: 1;
        }
        body.high-contrast .vote-link.soon { border-style: solid; }

        .vote-link i.main-icon {
            font-size: 2rem;
            color: var(--accent-orange);
            background: rgba(255, 153, 1, 0.1);
            width: 65px;
            height: 65px;
            line-height: 65px;
            border-radius: 50%;
            transform: translateZ(30px); /* 3D Pop */
        }

        .vote-link span {
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateZ(20px);
        }

        /* SOON Status */
        .vote-link.soon {
            opacity: 0.4;
            cursor: not-allowed !important;
            border-style: dashed;
        }

        .back-btn {
            margin-top: 50px;
            color: var(--text-gray);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
            z-index: 1;
        }
        .back-btn:hover { color: white; transform: translateX(-5px); }

        /* ACCESSIBILITY TOGGLE */
        .mode-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            background: rgba(34, 34, 34, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .vote-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <button class="mode-toggle" onclick="toggleContrast()">Toggle High Contrast</button>

    <div class="header">
        <h1>Vote for Rewards</h1>
        <p>Support the server and get rewarded in-game!</p>
    </div>

    <div class="reward-alert">
        <i class="fa-solid fa-gift" style="color: var(--accent-orange)"></i>
        <span>Rewards are <strong>automatically</strong> given to you once you have voted.</span>
    </div>

    <div class="vote-grid">
        <a href="https://minecraft-server-list.com/server/519278/" class="vote-link" target="_blank" data-tilt data-tilt-max="15">
            <i class="fa-solid fa-1 main-icon"></i>
            <span>MINECRAFT SERVERS <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.7rem; opacity: 0.5;"></i></span>
        </a>

        <a href="https://topg.org/minecraft-servers/server-681409" class="vote-link" target="_blank" data-tilt data-tilt-max="15">
            <i class="fa-solid fa-2 main-icon"></i>
            <span>TOP G <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.7rem; opacity: 0.5;"></i></span>
        </a>

        <a href="https://serveur-minecraft.com/5578" class="vote-link" target="_blank" data-tilt data-tilt-max="15">
            <i class="fa-solid fa-3 main-icon"></i>
            <span>SERVEUR MINECRAFT <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.7rem; opacity: 0.5;"></i></span>
        </a>

        <div class="vote-link soon">
            <i class="fa-solid fa-4 main-icon"></i>
            <span>SOON</span>
        </div>

        <div class="vote-link soon">
            <i class="fa-solid fa-5 main-icon"></i>
            <span>SOON</span>
        </div>

        <div class="vote-link soon">
            <i class="fa-solid fa-6 main-icon"></i>
            <span>SOON</span>
        </div>
    </div>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Back to Home</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // 1. Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.4 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 153, 1, 0.15)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < -10) p.y = canvas.height + 10;
            });
            requestAnimationFrame(animate);
        }

        // 2. Accessibility Toggle
        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animate();
    </script>
</body>
</html>
